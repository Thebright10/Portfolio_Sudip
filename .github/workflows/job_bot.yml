name: Daily Job Bot Automation

on:
  schedule:
    # Runs at 04:00 UTC every day (approx 9:30 AM IST)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Needed to commit jobs.json back to the repo

jobs:
  run-job-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-jobspy
          
      - name: Run Job Bot
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python job_bot.py
        
      - name: Commit and Push Updated Jobs Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs.json
          # Only commit if there are changes to jobs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily jobs data" && git push)
